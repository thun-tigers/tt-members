{% extends 'base.html' %}
{% block title %}Profil bearbeiten - Tigers Members{% endblock %}

{% block content %}
<div class="max-w-xl">
    <div class="mb-6">
        <h1 class="text-2xl font-bold">Profil vervollständigen</h1>
        <p class="text-sm text-slate-500 mt-1">Diese Angaben werden als dein Mitgliederprofil gespeichert.</p>
    </div>

    <form method="POST" class="bg-white border border-slate-200 rounded-lg shadow-sm p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Vorname *</label>
            <input name="first_name" value="{{ initial_first_name }}" required
                class="block w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Nachname *</label>
            <input name="last_name" value="{{ initial_last_name }}" required
                class="block w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Telefon</label>
            <input name="phone" value="{{ profile.phone if profile else '' }}"
                class="block w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Notizen</label>
            <textarea name="notes" rows="4"
                class="block w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">{{ profile.notes if profile else '' }}</textarea>
        </div>
        <button class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700">
            <i class="bi bi-send-check"></i>Antrag einreichen
        </button>
    </form>
</div>
{% endblock %}
