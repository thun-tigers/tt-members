{% extends 'base.html' %}

{% set active_tab = "me" %}
{% block title %}Antrag eingereicht – Tigers Members{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm p-8 text-center">
        <div class="w-16 h-16 flex items-center justify-center rounded-full bg-green-100 dark:bg-green-900/40 text-green-600 dark:text-green-400 mx-auto mb-6">
            <i class="bi bi-check2-circle text-3xl"></i>
        </div>
        <h1 class="text-2xl font-bold mb-2">Antrag eingereicht</h1>
        <p class="text-slate-600 dark:text-slate-400 text-sm">
            Dein Mitgliederprofil wurde gespeichert. Ein Administrator prüft nun deine Mannschaft und Rolle.
        </p>
        <div class="mt-6 flex flex-col sm:flex-row gap-3 justify-center">
            <a href="{{ url_for('main.index') }}" class="inline-flex items-center justify-center gap-2 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg transition">
                <i class="bi bi-house"></i>Zur Übersicht
            </a>
            <form method="POST" action="{{ url_for('auth.logout') }}">
                <button class="inline-flex items-center justify-center gap-2 w-full px-5 py-2.5 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 text-sm font-semibold rounded-lg transition">
                    <i class="bi bi-box-arrow-right"></i>Abmelden
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
