{% extends 'base.html' %}
{% block title %}Antrag eingereicht - Tigers Members{% endblock %}

{% block content %}
<div class="max-w-xl">
    <div class="bg-white border border-slate-200 rounded-lg shadow-sm p-8">
        <div class="w-12 h-12 flex items-center justify-center rounded-full bg-green-100 text-green-700 mb-5">
            <i class="bi bi-check-lg text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold">Antrag eingereicht</h1>
        <p class="mt-2 text-slate-600">
            Dein Mitgliederprofil wurde gespeichert. Ein Administrator prüft nun deine Mannschaft und Rolle.
        </p>
        <form method="POST" action="{{ url_for('auth.logout') }}" class="mt-6">
            <button class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700">
                <i class="bi bi-box-arrow-right"></i>Abmelden
            </button>
        </form>
    </div>
</div>
{% endblock %}
