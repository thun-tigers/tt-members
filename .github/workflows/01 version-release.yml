name: Version and Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  validate-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate VERSION file
        id: version
        shell: bash
        run: |
          if [ ! -f VERSION ]; then
            echo "VERSION file is missing" >&2
            exit 1
          fi

          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must match MAJOR.MINOR.PATCH, got: ${version}" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]] && [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match VERSION ${version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Step summary
        shell: bash
        run: |
          echo "## Version check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- VERSION: \`${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "- Tag: \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - validate-version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Release `${{ github.ref_name }}`

            Service version: `${{ needs.validate-version.outputs.version }}`
            Container image:
            `ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.ref_name }}`
