name: Container Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Additional image tag to publish
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir "tt-common @ git+https://github.com/thun-tigers/tt-common@main"
          pip install --no-cache-dir -r requirements.txt
          pip install pytest==8.0.0

      - name: Run tests
        run: python -m pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          image="${REGISTRY}/${IMAGE_NAME}"
          version="$(tr -d '[:space:]' < VERSION)"

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must match MAJOR.MINOR.PATCH, got: ${version}" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]] && [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match VERSION ${version}" >&2
            exit 1
          fi

          tags=("${image}:sha-${short_sha}")

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags+=("${image}:beta")
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/}"
            tags+=("${image}:${version}" "${image}:latest")
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.image_tag }}" ]; then
            manual_tag="$(echo "${{ github.event.inputs.image_tag }}" | tr '[:upper:]' '[:lower:]')"
            tags+=("${image}:${manual_tag}")
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve tt-common base image tag
        id: tc_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.version=${{ steps.tags.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: TT_COMMON_TAG=${{ steps.tc_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image summary
        shell: bash
        run: |
          echo "## Published image tags" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r tag; do
            echo "- \`${tag}\`" >> "$GITHUB_STEP_SUMMARY"
          done <<< "${{ steps.tags.outputs.tags }}"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- tt-common base: \`${{ steps.tc_tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
